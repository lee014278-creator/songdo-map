<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>부산 송도 해안산책로 명소 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg: #fffdf9;
    --beige: #f3ead9;
    --brown-light: #e6d4ba;
    --brown: #8b6f47;
    --brown-dark: #5c4630;
    --text: #4a3f33;
    --card-shadow: 0 2px 10px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  header {
    padding: 14px 16px 8px;
    text-align: center;
  }

  header h1 {
    margin: 0 0 4px;
    font-size: 19px;
    font-weight: 800;
    color: var(--brown-dark);
  }

  header p {
    margin: 0;
    font-size: 13px;
    color: #7a6a57;
  }

  .guide-label {
    margin: 10px auto 8px;
    max-width: 92%;
    text-align: center;
    background: var(--beige);
    color: var(--brown-dark);
    font-size: 13px;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 999px;
  }

  /* 지도는 화면에 고정, 스크롤해도 같은 자리에 머문다 */
  #map {
    width: 100%;
    height: 60vh;
    min-height: 380px;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .marker-label {
    font-size: 12.5px;
    font-weight: 800;
    color: var(--text);
    white-space: nowrap;
    padding: 2px 7px;
    border-radius: 6px;
    background: rgba(255,255,255,0.94);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    transform: translate(-50%, 4px);
    pointer-events: none;
  }

  .place-buttons {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 12px 14px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    background: var(--bg);
    position: relative;
    z-index: 2;
  }
  .place-buttons::-webkit-scrollbar { display: none; }

  .place-btn {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--brown-light);
    background: #fff;
    color: var(--brown-dark);
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    cursor: pointer;
  }

  .place-btn .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex: 0 0 auto;
  }

  .place-btn.active {
    background: var(--brown-dark);
    border-color: var(--brown-dark);
    color: #fff;
  }

  .list-wrap {
    padding: 4px 14px 30px;
  }

  .list-wrap h2 {
    font-size: 15px;
    color: var(--brown-dark);
    margin: 4px 0 10px;
  }

  .place-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: var(--card-shadow);
    padding: 14px 16px;
    margin-bottom: 10px;
    border-left: 5px solid transparent;
    transition: box-shadow 0.2s, transform 0.2s;
  }

  .place-card.highlight {
    box-shadow: 0 4px 16px rgba(0,0,0,0.16);
  }

  .place-card .pname {
    font-size: 15px;
    font-weight: 800;
    color: var(--brown-dark);
    margin-bottom: 4px;
  }

  .place-card .ptype {
    display: inline-block;
    font-size: 11px;
    color: #fff;
    padding: 2px 8px;
    border-radius: 999px;
    margin-bottom: 6px;
  }

  .place-card .pdesc {
    font-size: 13.5px;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.5;
  }

  .place-card .naver-btn {
    display: inline-block;
    font-size: 13.5px;
    font-weight: 700;
    color: #fff;
    background: var(--brown);
    padding: 9px 14px;
    border-radius: 10px;
    text-decoration: none;
  }

  .leaflet-popup-content {
    font-family: inherit;
    font-size: 13.5px;
    line-height: 1.5;
    min-width: 190px;
  }
  .leaflet-popup-content b {
    font-size: 15px;
    color: var(--brown-dark);
  }
  .leaflet-popup-content .popup-naver {
    display: inline-block;
    margin-top: 8px;
    background: var(--brown);
    color: #fff;
    padding: 7px 12px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
  }
  .leaflet-popup-content .popup-search-note {
    font-size: 11px;
    color: #999;
    display: block;
    margin-top: 2px;
  }

  @media (min-width: 860px) {
    #map {
      height: 80vh;
    }
  }
</style>
</head>
<body>

<header>
  <h1>부산 송도 해안산책로 명소 지도</h1>
  <p>해수욕장부터 케이블카까지, 한눈에 보는 송도 코스</p>
</header>

<div class="guide-label">장소를 눌러 위치와 정보를 확인하세요</div>

<div id="map"></div>

<div class="place-buttons" id="placeButtons"></div>

<div class="list-wrap">
  <h2>장소 목록</h2>
  <div id="placeList"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const places = [
    {
      id: 1,
      name: "송도해수욕장",
      type: "해변",
      color: "#3f7ea6",
      lat: 35.0755,
      lng: 129.0168,
      desc: "1913년 개장한 국내 첫 공설 해수욕장",
      naverUrl: "https://map.naver.com/p/search/송도해수욕장",
      isSearchLink: true
    },
    {
      id: 2,
      name: "거북섬 구름산책로",
      type: "산책로",
      color: "#3f9a6a",
      lat: 35.0759,
      lng: 129.0216,
      desc: "해안 데크길, 투명 바닥 구간이 있는 산책로",
      naverUrl: "https://map.naver.com/p/search/거북섬 구름산책로",
      isSearchLink: true
    },
    {
      id: 3,
      name: "암남공원",
      type: "공원",
      color: "#6a9a3f",
      lat: 35.0609,
      lng: 129.0161,
      desc: "해안 생태공원, 산책로와 전망대",
      naverUrl: "https://map.naver.com/p/search/암남공원",
      isSearchLink: true
    },
    {
      id: 4,
      name: "송도용궁구름다리",
      type: "다리",
      color: "#a66b3f",
      lat: 35.0619,
      lng: 129.0222,
      desc: "바다 위로 이어지는 해상 구름다리",
      naverUrl: "https://map.naver.com/p/search/송도용궁구름다리",
      isSearchLink: true
    },
    {
      id: 5,
      name: "송도해상케이블카",
      type: "케이블카",
      color: "#9a3f7e",
      lat: 35.0759,
      lng: 129.0216,
      desc: "거북섬과 암남공원(스카이파크)을 잇는 케이블카",
      naverUrl: "https://map.naver.com/p/search/송도해상케이블카",
      isSearchLink: true
    }
  ];

  const map = L.map('map', { scrollWheelZoom: false }).setView([35.0690, 129.0190], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const markerById = {};

  function makeIcon(color, name) {
    return L.divIcon({
      className: 'custom-pin',
      html: `
        <div style="position:relative;">
          <div style="
            width:26px; height:26px; border-radius:50% 50% 50% 0;
            background:${color}; transform:rotate(-45deg);
            border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.35);
          "></div>
          <div class="marker-label" style="
            position:absolute; left:13px; top:28px; border:1.5px solid ${color};
          ">${name}</div>
        </div>
      `,
      iconSize: [120, 50],
      iconAnchor: [13, 26],
      popupAnchor: [0, -24]
    });
  }

  function popupHtml(p) {
    let html = `<b>${p.name}</b><br/>`;
    html += `<span style="color:#888;">${p.type}</span><br/>`;
    html += `<span>${p.desc}</span><br/>`;
    if (p.isSearchLink) {
      html += `<a class="popup-naver" href="${p.naverUrl}" target="_blank" rel="noopener">네이버지도 검색 바로가기</a>`;
      html += `<span class="popup-search-note">※ 정확한 장소 링크가 아닌 검색 결과로 연결됩니다</span>`;
    } else {
      html += `<a class="popup-naver" href="${p.naverUrl}" target="_blank" rel="noopener">네이버지도 바로가기</a>`;
    }
    return html;
  }

  // 5개 장소를 항상 전체 표시 (필터 없음, 고정 지도)
  const bounds = [];
  places.forEach(p => {
    const marker = L.marker([p.lat, p.lng], { icon: makeIcon(p.color, p.name) })
      .addTo(map)
      .bindPopup(popupHtml(p));
    marker.on('click', () => selectPlace(p.id));
    markerById[p.id] = marker;
    bounds.push([p.lat, p.lng]);
  });
  map.fitBounds(bounds, { padding: [40, 40], maxZoom: 16 });

  function renderButtons() {
    const wrap = document.getElementById('placeButtons');
    wrap.innerHTML = '';
    places.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'place-btn';
      btn.id = 'btn-' + p.id;
      btn.innerHTML = `<span class="dot" style="background:${p.color};"></span>${p.name}`;
      btn.addEventListener('click', () => selectPlace(p.id));
      wrap.appendChild(btn);
    });
  }

  function renderList() {
    const listEl = document.getElementById('placeList');
    listEl.innerHTML = '';
    places.forEach(p => {
      const card = document.createElement('div');
      card.className = 'place-card';
      card.id = 'card-' + p.id;
      card.style.borderLeftColor = p.color;
      card.innerHTML = `
        <div class="pname">${p.name}</div>
        <div class="ptype" style="background:${p.color};">${p.type}</div>
        <div class="pdesc">${p.desc}</div>
        <a class="naver-btn" href="${p.naverUrl}" target="_blank" rel="noopener">네이버지도 검색 바로가기</a>
      `;
      card.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') return;
        selectPlace(p.id);
      });
      listEl.appendChild(card);
    });
  }

  function selectPlace(id) {
    const p = places.find(pl => pl.id === id);
    if (!p) return;

    // 지도 시점 이동 (지도 자체는 화면에서 고정 위치, 보여주는 위치만 바뀜)
    map.setView([p.lat, p.lng], 17);
    const marker = markerById[id];
    if (marker) marker.openPopup();

    // 버튼 활성 표시
    document.querySelectorAll('.place-btn').forEach(b => b.classList.remove('active'));
    const activeBtn = document.getElementById('btn-' + id);
    if (activeBtn) activeBtn.classList.add('active');

    // 해당 장소 카드를 목록 맨 위로 이동
    const listEl = document.getElementById('placeList');
    const card = document.getElementById('card-' + id);
    if (card) {
      listEl.prepend(card);
      document.querySelectorAll('.place-card').forEach(c => c.classList.remove('highlight'));
      card.classList.add('highlight');
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  renderButtons();
  renderList();
</script>

</body>
</html>
