<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>부산 송도 해안산책로 명소 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg: #fffdf9;
    --beige: #f3ead9;
    --brown-light: #e6d4ba;
    --brown: #8b6f47;
    --brown-dark: #5c4630;
    --text: #4a3f33;
    --card-shadow: 0 2px 10px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  header {
    padding: 14px 16px 8px;
    text-align: center;
  }

  header h1 {
    margin: 0 0 4px;
    font-size: 19px;
    font-weight: 800;
    color: var(--brown-dark);
  }

  header p {
    margin: 0;
    font-size: 13px;
    color: #7a6a57;
  }

  .guide-label {
    margin: 10px auto 8px;
    max-width: 92%;
    text-align: center;
    background: var(--beige);
    color: var(--brown-dark);
    font-size: 13px;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 999px;
  }

  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 14px 10px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex: 0 0 auto;
    padding: 10px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--brown-light);
    background: #fff;
    color: var(--brown-dark);
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .filter-btn.active {
    background: var(--brown);
    border-color: var(--brown);
    color: #fff;
  }

  #map {
    width: 100%;
    height: 68vh;
    min-height: 420px;
  }

  .list-wrap {
    padding: 14px 14px 30px;
  }

  .list-wrap h2 {
    font-size: 15px;
    color: var(--brown-dark);
    margin: 4px 0 10px;
  }

  .place-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: var(--card-shadow);
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .place-card .pname {
    font-size: 15px;
    font-weight: 800;
    color: var(--brown-dark);
    margin-bottom: 4px;
  }

  .place-card .ptype {
    display: inline-block;
    font-size: 11px;
    color: var(--brown);
    background: var(--beige);
    padding: 2px 8px;
    border-radius: 999px;
    margin-bottom: 6px;
  }

  .place-card .pdesc {
    font-size: 13.5px;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.5;
  }

  .place-card .naver-btn {
    display: inline-block;
    font-size: 13.5px;
    font-weight: 700;
    color: #fff;
    background: var(--brown);
    padding: 9px 14px;
    border-radius: 10px;
    text-decoration: none;
  }

  .leaflet-popup-content {
    font-family: inherit;
    font-size: 13.5px;
    line-height: 1.5;
    min-width: 190px;
  }
  .leaflet-popup-content b {
    font-size: 15px;
    color: var(--brown-dark);
  }
  .leaflet-popup-content .popup-naver {
    display: inline-block;
    margin-top: 8px;
    background: var(--brown);
    color: #fff;
    padding: 7px 12px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
  }
  .leaflet-popup-content .popup-search-note {
    font-size: 11px;
    color: #999;
    display: block;
    margin-top: 2px;
  }

  @media (min-width: 860px) {
    .page {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
    }
    #map {
      height: 82vh;
      flex: 1 1 65%;
    }
    .list-wrap {
      flex: 1 1 35%;
      max-height: 82vh;
      overflow-y: auto;
    }
  }
</style>
</head>
<body>

<header>
  <h1>부산 송도 해안산책로 명소 지도</h1>
  <p>해수욕장부터 케이블카까지, 한눈에 보는 송도 코스</p>
</header>

<div class="guide-label">장소를 눌러 위치와 정보를 확인하세요</div>

<div class="filters" id="filters"></div>

<div class="page">
  <div id="map"></div>
  <div class="list-wrap">
    <h2>장소 목록</h2>
    <div id="placeList"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const places = [
    {
      id: 1,
      name: "송도해수욕장",
      type: "해변",
      typeColor: "#3f7ea6",
      lat: 35.0755,
      lng: 129.0168,
      desc: "1913년 개장한 국내 첫 공설 해수욕장",
      naverUrl: "https://map.naver.com/p/search/송도해수욕장",
      isSearchLink: true
    },
    {
      id: 2,
      name: "거북섬 구름산책로",
      type: "산책로",
      typeColor: "#3f9a6a",
      lat: 35.0759,
      lng: 129.0216,
      desc: "해안 데크길, 투명 바닥 구간이 있는 산책로",
      naverUrl: "https://map.naver.com/p/search/거북섬 구름산책로",
      isSearchLink: true
    },
    {
      id: 3,
      name: "암남공원",
      type: "공원",
      typeColor: "#6a9a3f",
      lat: 35.0609,
      lng: 129.0161,
      desc: "해안 생태공원, 산책로와 전망대",
      naverUrl: "https://map.naver.com/p/search/암남공원",
      isSearchLink: true
    },
    {
      id: 4,
      name: "송도용궁구름다리",
      type: "다리",
      typeColor: "#a66b3f",
      lat: 35.0619,
      lng: 129.0222,
      desc: "바다 위로 이어지는 해상 구름다리",
      naverUrl: "https://map.naver.com/p/search/송도용궁구름다리",
      isSearchLink: true
    },
    {
      id: 5,
      name: "송도해상케이블카",
      type: "케이블카",
      typeColor: "#9a3f7e",
      lat: 35.0759,
      lng: 129.0216,
      desc: "거북섬과 암남공원(스카이파크)을 잇는 케이블카",
      naverUrl: "https://map.naver.com/p/search/송도해상케이블카",
      isSearchLink: true
    }
  ];

  const filterTypes = ["전체", "해변", "산책로", "공원", "다리", "케이블카"];

  const map = L.map('map', { scrollWheelZoom: false }).setView([35.0690, 129.0190], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  let currentMarkers = [];

  function makeIcon(color) {
    return L.divIcon({
      className: 'custom-pin',
      html: `<div style="
        width:26px; height:26px; border-radius:50% 50% 50% 0;
        background:${color}; transform:rotate(-45deg);
        border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.35);
      "></div>`,
      iconSize: [26, 26],
      iconAnchor: [13, 26],
      popupAnchor: [0, -24]
    });
  }

  function clearMarkers() {
    currentMarkers.forEach(m => map.removeLayer(m));
    currentMarkers = [];
  }

  function popupHtml(p) {
    let html = `<b>${p.name}</b><br/>`;
    html += `<span style="color:#888;">${p.type}</span><br/>`;
    html += `<span>${p.desc}</span><br/>`;
    if (p.isSearchLink) {
      html += `<a class="popup-naver" href="${p.naverUrl}" target="_blank" rel="noopener">네이버지도 검색 바로가기</a>`;
      html += `<span class="popup-search-note">※ 정확한 장소 링크가 아닌 검색 결과로 연결됩니다</span>`;
    } else {
      html += `<a class="popup-naver" href="${p.naverUrl}" target="_blank" rel="noopener">네이버지도 바로가기</a>`;
    }
    return html;
  }

  function renderMarkers(filtered) {
    clearMarkers();
    const bounds = [];
    filtered.forEach(p => {
      const marker = L.marker([p.lat, p.lng], { icon: makeIcon(p.typeColor) })
        .addTo(map)
        .bindPopup(popupHtml(p));
      currentMarkers.push(marker);
      bounds.push([p.lat, p.lng]);
    });
    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [40, 40], maxZoom: 16 });
    }
  }

  function renderList(filtered) {
    const listEl = document.getElementById('placeList');
    listEl.innerHTML = '';
    filtered.forEach(p => {
      const card = document.createElement('div');
      card.className = 'place-card';
      card.innerHTML = `
        <div class="pname">${p.name}</div>
        <div class="ptype" style="color:${p.typeColor};">${p.type}</div>
        <div class="pdesc">${p.desc}</div>
        <a class="naver-btn" href="${p.naverUrl}" target="_blank" rel="noopener">네이버지도 검색 바로가기</a>
      `;
      card.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') return;
        map.setView([p.lat, p.lng], 17);
        const marker = currentMarkers.find(m => {
          const ll = m.getLatLng();
          return ll.lat === p.lat && ll.lng === p.lng;
        });
        if (marker) marker.openPopup();
      });
      listEl.appendChild(card);
    });
  }

  function applyFilter(type) {
    const filtered = type === "전체" ? places : places.filter(p => p.type === type);
    renderMarkers(filtered);
    renderList(filtered);
  }

  function buildFilterButtons() {
    const wrap = document.getElementById('filters');
    filterTypes.forEach((type, idx) => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (idx === 0 ? ' active' : '');
      btn.textContent = type;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilter(type);
      });
      wrap.appendChild(btn);
    });
  }

  buildFilterButtons();
  applyFilter("전체");
</script>

</body>
</html>
